{% extends 'base.html' %}
{% block title %}로그인 - 오늘의 메뉴{% endblock %}

{% block content %}
<div style="display:flex;justify-content:center;padding:24px 0">
  <div style="background:var(--bg-white);border-radius:var(--border-radius-xl);padding:40px;width:100%;max-width:420px;box-shadow:var(--shadow-lg)">
    <div style="text-align:center;margin-bottom:28px">
      <div class="site-logo" style="justify-content:center;font-size:1.5rem">🍽️ <span>오늘의 메뉴</span></div>
    </div>
    <h2 class="auth-title">로그인</h2>
    <p class="auth-sub">계정에 로그인해주세요</p>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group form-icon-wrap">
        <span class="form-icon">✉️</span>
        <input type="email" name="email" class="form-control" placeholder="이메일" required autofocus>
      </div>
      <div class="form-group form-icon-wrap">
        <span class="form-icon">🔒</span>
        <input type="password" name="password" class="form-control" placeholder="비밀번호" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:8px">로그인</button>
    </form>

    <div class="auth-divider" style="margin:20px 0">또는</div>
    <a href="{{ url_for('auth.register') }}" class="btn btn-secondary btn-block btn-lg">회원가입</a>
    <p class="auth-footer">
      <a href="#">비밀번호 찾기</a> · <a href="#">이메일 찾기</a>
    </p>
  </div>
</div>
{% endblock %}
