{% extends 'base.html' %}
{% block title %}파티 만들기 - 오늘의 메뉴{% endblock %}

{% block content %}
<a href="{{ url_for('party.index') }}" class="btn btn-sm btn-secondary" style="margin-bottom:16px">← 목록으로</a>
<h2 style="margin-bottom:24px">🍽️ 밥친구 파티 만들기</h2>

<div style="background:var(--bg-white);border:1px solid var(--border-color);border-radius:var(--border-radius-xl);padding:32px;max-width:560px">
  <form method="POST" action="{{ url_for('party.create') }}">
    <div class="form-group">
      <label class="form-label">파티 제목 *</label>
      <input type="text" name="title" class="form-control" placeholder="예: 강남역 근처 삼겹살 같이 먹어요!" required>
    </div>
    <div class="form-group">
      <label class="form-label">식당 선택 *</label>
      <select name="restaurant_id" class="form-control" required>
        <option value="">-- 식당을 선택하세요 --</option>
        {% for r in restaurants %}
        <option value="{{ r.restaurant_id }}">{{ r.name }} ({{ r.category }}) - {{ r.address[:30] }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">약속 일시 *</label>
      <input type="datetime-local" name="meeting_time" class="form-control" required>
    </div>
    <div class="form-group">
      <label class="form-label">최대 인원 *</label>
      <input type="number" name="max_people" class="form-control" min="2" max="10" value="4" required>
    </div>
    <button type="submit" class="btn btn-primary btn-lg btn-block">파티 생성하기</button>
  </form>
</div>
{% endblock %}
